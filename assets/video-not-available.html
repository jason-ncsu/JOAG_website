<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video not available</title>
  <style>
    :root {
      --bg-1: #07142c;
      --bg-2: #0d2d63;
      --bg-3: #163a74;
      --text: #eff5ff;
      --muted: #c2d4ff;
      --border: rgba(164, 194, 255, 0.22);
      --panel: rgba(24, 52, 106, 0.72);
      --font-sans: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: var(--font-sans);
      color: var(--text);
      background:
        radial-gradient(circle at 18% 14%, rgba(101, 172, 255, 0.24), transparent 22%),
        radial-gradient(circle at 84% 18%, rgba(193, 81, 255, 0.18), transparent 26%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
    }

    .card {
      width: min(640px, 100%);
      padding: 32px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(34, 70, 134, 0.68), rgba(20, 43, 90, 0.72));
      border: 1px solid var(--border);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Video not available</h1>
    <p>The related video for this publication is not available yet. Coming soon.</p>
  </main>
</body>
</html>
